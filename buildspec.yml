version: 0.2

# 環境変数（S3バケット名など）
env:
  variables:
    LAMBDA_BUCKET: "myapp-lambda-bucket-apne1"
    CFN_BUCKET: "myapp-cfn-bucket-apne1"
    FRONTEND_BUCKET: "myapp-frontend-bucket-apne1"
    AWS_DEFAULT_REGION: "ap-northeast-1"
    

phases:
  install:
    runtime-versions:
      nodejs: 18
      python: 3.11
    commands:
      - echo "=== Install phase ==="
      - echo "Dependencies installed."

  pre_build:
    commands:
      - echo "=== Pre-build phase ==="
      - echo "CodeBuild pre-build setup complete."

  build:
    commands:
      - echo "=== Build phase ==="
      
      # Lambdaコードのビルド & ZIP化
      - echo "Building Lambda function..."
      - mkdir -p build/lambda
      - cp -r lambda/* build/lambda/
      - cd build/lambda
      - zip -r ../../lambda.zip .
      - cd ../../
      - echo "Lambda package created."

      # フロントエンドはビルド不要（静的ファイル）
      - echo "Frontend build skipped (static files)"

      # CloudFormationテンプレートの準備
      - echo "Preparing CloudFormation templates..."
      - mkdir -p cfn-output
      - cp cfn/*.yaml cfn-output/
      - echo "CloudFormation templates ready."

  post_build:
    commands:
      - echo "=== Post-build phase ==="

      # フロントエンドファイルを S3 にアップロード
      - echo "Uploading frontend templates to S3..."
      - aws s3 cp frontend/ s3://$FRONTEND_BUCKET/ --recursive
      - echo "frontend templates uploaded."

      # Lambda ZIP を S3 にアップロード
      - echo "Uploading Lambda to S3..."
      - aws s3 cp lambda.zip s3://$LAMBDA_BUCKET/lambda.zip
      - echo "Lambda uploaded."

      # CloudFormationテンプレートを S3 にアップロード
      - echo "Uploading CloudFormation templates to S3..."
      - aws s3 cp cfn-output/ s3://$CFN_BUCKET/ --recursive
      - echo "CloudFormation templates uploaded."

artifacts:
  files:
    - lambda.zip
    - frontend/**/*
    - cfn-output/**/*