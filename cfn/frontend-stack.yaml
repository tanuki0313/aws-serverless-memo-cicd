AWSTemplateFormatVersion: '2010-09-09'
Description: Frontend stack for Memo App (S3 + CloudFront)

Parameters:
  StageName:
    Type: String
    Default: dev  # API Gateway のステージ名（Invoke URL のパスに使用）

  ########################################################
  # ★追加：API連携を有効化するかどうか（2段階デプロイ用）
  # false: APIなしで作成（循環依存回避）
  # true : APIをCloudFrontに組み込む（2回目のデプロイで使用）
  ########################################################
  EnableApi:
    Type: String
    Default: false
    AllowedValues:
      - true
      - false

########################################################
# ★追加：条件定義
# EnableApi=true のときだけ API 関連リソースを有効化する
########################################################
Conditions:
  UseApi: !Equals [!Ref EnableApi, "true"]

Resources:

  ########################################################
  # 工程1: S3 バケット（フロントエンド静的ファイル用）
  ########################################################
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: myapp-frontend-bucket-apne1
      # パブリックアクセスをブロック（CloudFront 経由のみ許可）
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      # ライフサイクルルール（途中で失敗したアップロードを7日後に削除）
      LifecycleConfiguration:
        Rules:
          - Id: DeleteIncompleteMultipartUpload
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
      Tags:
        - Key: Project
          Value: MemoApp

  ########################################################
  # 工程3: CloudFront Origin Access Control (OAC)
  # S3 への直接アクセスを防ぎ、CloudFront からのみアクセス可能
  ########################################################
  FrontendDistributionOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: memo-frontend-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  ########################################################
  # 工程4: CloudFront ディストリビューション
  ########################################################
  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: Memo App Frontend
        DefaultRootObject: index.html
        PriceClass: PriceClass_200

        Origins:
          # S3 静的コンテンツ用オリジン
          - Id: S3Frontend
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt FrontendDistributionOAC.Id
            S3OriginConfig: {}

          ########################################################
          # ★追加：API Gateway 用オリジン（条件付き）
          # EnableApi=true のときだけ作成される
          # → 1回目デプロイでは存在しないため循環依存を回避できる
          ########################################################
          - !If
            - UseApi
            - Id: ApiOrigin
              DomainName: !Sub
                - ${ApiId}.execute-api.${AWS::Region}.amazonaws.com
                - ApiId: !ImportValue MemoApiId
              # API Gateway のステージを CloudFront 側で付与する（例: /dev）
              OriginPath: !Sub /${StageName}
              CustomOriginConfig:
                OriginProtocolPolicy: https-only
            - !Ref AWS::NoValue

        # デフォルトキャッシュ動作（S3 用）
        # ブラウザがアクセスしてきたらS3に転送するというルール
        DefaultCacheBehavior:
          TargetOriginId: S3Frontend
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS   # CORS 対応
          CachedMethods:
            - GET
            - HEAD
          ForwardedValues:
            QueryString: false
          Compress: true

        ########################################################
        # ★追加：/memos の API ルーティング（条件付き）
        # EnableApi=true のときだけ有効化される
        ########################################################
        CacheBehaviors:
          - !If
            - UseApi
            - PathPattern: /memos*
              TargetOriginId: ApiOrigin
              ViewerProtocolPolicy: redirect-to-https
              AllowedMethods:
                - GET
                - HEAD
                - OPTIONS
                - PUT
                - POST
                - PATCH
                - DELETE
              CachedMethods:
                - GET
                - HEAD
              # キャッシュ無効（APIは毎回最新データを返す必要があるため）
              CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
              # Authorization含む全ヘッダーを転送（Hostヘッダーを除く）
              OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AllViewerExceptHostHeader
            - !Ref AWS::NoValue

        # SPA 用：存在しないパスでも index.html を返す
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 0

  ########################################################
  # 工程5: S3 バケットポリシー
  # CloudFront からの GetObject のみ許可
  ########################################################
  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${FrontendBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}

Outputs:

  ########################################################
  # フロントエンド URL（末尾スラッシュなし）
  ########################################################
  FrontendUrl:
    Description: Frontend URL (CloudFront)
    Value: !Sub
      - 'https://${DomainName}'
      - DomainName: !GetAtt FrontendDistribution.DomainName
    Export:
      Name: MemoFrontendUrl

  # Cognito Hosted UI 用（末尾スラッシュ付き）
  FrontendUrlWithSlash:
    Description: Frontend URL with trailing slash
    Value: !Sub
      - 'https://${DomainName}/'
      - DomainName: !GetAtt FrontendDistribution.DomainName
    Export:
      Name: MemoFrontendUrlWithSlash

  ########################################################
  # CloudFront ディストリビューションID（invalidation 用）
  ########################################################
  FrontendDistributionId:
    Description: CloudFront Distribution ID
    Value: !Ref FrontendDistribution
    Export:
      Name: MemoFrontendDistributionId

  ########################################################
  # S3 バケット名（アップロード先）
  ########################################################
  FrontendBucketName:
    Description: S3 Bucket for frontend assets
    Value: !Ref FrontendBucket
    Export:
      Name: MemoFrontendBucketName